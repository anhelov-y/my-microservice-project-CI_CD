replicaCount: 2

image:
  repository: "024171229197.dkr.ecr.eu-central-1.amazonaws.com/django-app-repo"
  tag: "latest"

service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

env:
  DEBUG: "True"
  DB_NAME: "postgres"
  DB_USER: "postgres"
  DB_HOST: "db-service"
  DB_PORT: "5432"

hpa:
  minReplicas: 2
  maxReplicas: 6
  targetCPU: 70
